<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0d1117; }
  .wrap { width: 1920px; height: 1080px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative; }
  .grid-bg { position: absolute; width: 100%; height: 100%;
    background-image: linear-gradient(rgba(0,229,160,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.05) 1px, transparent 1px);
    background-size: 40px 40px; }
  .glow { position: absolute; width: 800px; height: 800px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,160,0.06), transparent 70%); }
  .glow2 { position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,136,62,0.05), transparent 70%); }
  .week-label { font-size: 32px; color: #00e5a0; font-weight: 700; z-index:1;
    background: rgba(0,229,160,0.08); padding: 8px 28px; border-radius: 24px;
    border: 1px solid rgba(0,229,160,0.2); }
  .title { font-size: 68px; color: #ffffff; font-weight: 900; margin-top: 24px;
    letter-spacing: 3px; z-index:1; }
  .title .accent { color: #f0883e; }
  .cards { display: flex; gap: 36px; margin-top: 48px; z-index:1; }
  .card { width: 340px; padding: 28px 24px; background: rgba(22,27,34,0.9);
    border: 1px solid rgba(0,229,160,0.12); border-radius: 16px;
    text-align: center; }
  .card-rank { font-size: 18px; color: #8b949e; font-weight: 600; margin-bottom: 8px; }
  .card-name { font-family: 'JetBrains Mono', monospace; font-size: 22px;
    color: #58a6ff; font-weight: 700; margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-desc { font-size: 16px; color: #8b949e; margin-bottom: 12px;
    line-height: 1.4; height: 44px; overflow: hidden; }
  .card-stars { font-family: 'JetBrains Mono', monospace; font-size: 40px;
    color: #f0883e; font-weight: 900; }
  .card-unit { font-size: 16px; color: #8b949e; margin-top: 2px; }
  .stats { font-size: 24px; color: #8b949e; margin-top: 44px; z-index:1; }
  .stats span { color: #00e5a0; font-weight: 700; }
  .divider { width: 120px; height: 3px; margin-top: 20px; z-index:1;
    background: linear-gradient(90deg, #00e5a0, #f0883e); border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-300px; left:-200px;"></div>
  <div class="glow2" style="bottom:-200px; right:-100px;"></div>
  <div class="week-label">2026年5月第3周</div>
  <div class="title">GitHub <span class="accent">热门开源项目</span>盘点</div>
  <div class="divider"></div>
  <div class="cards">
    <div class="card">
      <div class="card-rank">TOP 1</div>
      <div class="card-name">mattpocock/skills</div>
      <div class="card-desc">编程代理实战技能集</div>
      <div class="card-stars">+18,795</div>
      <div class="card-unit">本周涨幅</div>
    </div>
    <div class="card">
      <div class="card-rank">TOP 2</div>
      <div class="card-name">CloakBrowser</div>
      <div class="card-desc">通过所有机器人检测的隐身浏览器</div>
      <div class="card-stars">+8,618</div>
      <div class="card-unit">本周涨幅</div>
    </div>
    <div class="card">
      <div class="card-rank">TOP 3</div>
      <div class="card-name">agentmemory</div>
      <div class="card-desc">AI 编程代理持久记忆方案</div>
      <div class="card-stars">+6,907</div>
      <div class="card-unit">本周涨幅</div>
    </div>
  </div>
  <div class="stats">本周涨幅 <span>80,092</span> ★ · <span>16</span> 个项目 · <span>4</span> 个分类 · 三源交叉验证</div>
</div>
</body>
</html>
