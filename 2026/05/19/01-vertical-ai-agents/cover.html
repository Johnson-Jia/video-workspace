<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060d1f; overflow: hidden; }
.cover {
  position: relative; width: 2160px; height: 3840px;
  background: linear-gradient(180deg, #060d1f 0%, #0f172a 50%, #060d1f 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
}
.bg-grid {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 120px 120px;
}
.glow1 {
  position: absolute; width: 1200px; height: 1200px;
  background: #f59e0b; border-radius: 50%; filter: blur(300px);
  opacity: 0.25; top: 200px; left: -300px;
}
.glow2 {
  position: absolute; width: 1000px; height: 1000px;
  background: #3b82f6; border-radius: 50%; filter: blur(300px);
  opacity: 0.2; bottom: 300px; right: -240px;
}
.date-section {
  position: relative; display: flex; flex-direction: column; align-items: center; margin-bottom: 120px;
}
.date-text {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 88px; font-weight: 800; color: #f59e0b; letter-spacing: 6px;
  text-shadow: 0 0 40px rgba(245,158,11,0.4);
}
.date-label {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 56px; font-weight: 700; color: #3b82f6; margin-top: 28px; letter-spacing: 4px;
}
.badge {
  position: relative; display: inline-block;
  background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
  color: #f59e0b; font-family: 'Inter', sans-serif;
  font-size: 64px; font-weight: 700; padding: 28px 80px;
  border-radius: 80px; margin-bottom: 72px; letter-spacing: 2px;
}
.title {
  position: relative; font-family: 'Inter', sans-serif;
  font-size: 192px; font-weight: 900; color: #fff;
  text-align: center; line-height: 1.15; letter-spacing: -4px;
}
.accent { color: #f59e0b; }
.line {
  position: relative; width: 440px; height: 12px;
  background: linear-gradient(90deg, #f59e0b, #3b82f6); border-radius: 6px;
  margin-top: 88px; margin-bottom: 88px;
}
.sub {
  position: relative; font-family: 'Inter', sans-serif;
  font-size: 104px; font-weight: 700; color: #3b82f6; text-align: center;
}
.stats { position: relative; display: flex; gap: 56px; margin-top: 112px; }
.stat-box {
  background: rgba(15,23,42,0.85); border: 1px solid rgba(245,158,11,0.18);
  border-radius: 40px; padding: 56px 88px; text-align: center;
}
.stat-num {
  font-family: 'JetBrains Mono', monospace; font-size: 112px; font-weight: 700; color: #f59e0b;
}
.stat-label { font-family: 'Inter', sans-serif; font-size: 52px; color: #94a3b8; margin-top: 12px; }
</style>
</head>
<body>
<div data-composition-id="cover" data-width="2160" data-height="3840" data-start="0">
  <div class="cover">
    <div class="bg-grid"></div>
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="date-section">
      <div class="date-text">2026年5月19日</div>
      <div class="date-label">商业项目深度解析</div>
    </div>
    <div class="badge">垂直AI智能体</div>
    <div class="title">140亿美元 <span class="accent">市场机会</span></div>
    <div class="line"></div>
    <div class="sub">从痛点到落地 · 完整推演</div>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-num">45%+</div>
        <div class="stat-label">年增长率</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">3条</div>
        <div class="stat-label">商业化路径</div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
window.__timelines = {};
const tl = gsap.timeline({paused: true});
tl.to({}, {duration: 0.5});
window.__timelines["cover"] = tl;
</script>
</body>
</html>
