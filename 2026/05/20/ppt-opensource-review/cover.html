<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;background:#060612;font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif}
.cover{position:relative;width:1080px;height:1920px;background:linear-gradient(180deg,#060612 0%,#0e0e2a 50%,#060612 100%);overflow:hidden}

/* glow */
.glow{position:absolute;border-radius:50%;filter:blur(160px);pointer-events:none}
.glow-warm{width:600px;height:600px;background:#f0b429;opacity:.22;top:400px;left:-120px}
.glow-cool{width:500px;height:500px;background:#00d4aa;opacity:.18;bottom:300px;right:-80px}

/* grid */
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,170,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* content */
.content{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 80px;z-index:1}

/* Layer 1: date */
.date{font-size:28px;font-weight:600;color:#6b7280;letter-spacing:2px;margin-bottom:40px}

/* Layer 2: capsule badge */
.capsule{display:inline-block;font-size:30px;font-weight:700;padding:12px 36px;border-radius:40px;background:rgba(0,212,170,.12);color:#00d4aa;margin-bottom:48px}

/* Layer 3: main title */
.main-title{font-size:100px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1.15;text-align:center;text-shadow:0 0 60px rgba(240,180,41,.4)}

/* Layer 4: gradient divider */
.divider{width:200px;height:4px;margin:48px 0;background:linear-gradient(90deg,#f0b429,#00d4aa);border-radius:2px}

/* Layer 5: subtitle */
.subtitle{font-size:42px;font-weight:600;color:#a0a0c0;text-align:center;line-height:1.4}

/* Layer 6: data card */
.data-card{margin-top:56px;width:880px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:36px 48px;display:flex;justify-content:space-between;align-items:center}
.data-item{text-align:center}
.data-val{font-size:44px;font-weight:900}
.data-label{font-size:22px;color:#6b7280;margin-top:8px}
.data-sep{width:1px;height:60px;background:rgba(255,255,255,.08)}
</style>
</head>
<body>
<div class="cover">
  <div class="glow glow-warm"></div>
  <div class="glow glow-cool"></div>
  <div class="grid"></div>
  <div class="content">
    <div class="date">2026.05.20</div>
    <div class="capsule">五轮淘汰赛 深度测评</div>
    <div class="main-title">AI 做 PPT<br><span style="color:#f0b429">5个开源项目</span></div>
    <div class="divider"></div>
    <div class="subtitle">帮你选出最好用的那个</div>
    <div class="data-card">
      <div class="data-item"><div class="data-val" style="color:#f0b429">18.7K</div><div class="data-label">PPT Master</div></div>
      <div class="data-sep"></div>
      <div class="data-item"><div class="data-val" style="color:#00d4aa">5.0K</div><div class="data-label">Presenton</div></div>
      <div class="data-sep"></div>
      <div class="data-item"><div class="data-val" style="color:#a0a0c0">4.4K</div><div class="data-label">PPTAgent</div></div>
      <div class="data-sep"></div>
      <div class="data-item"><div class="data-val" style="color:#a0a0c0">2.8K</div><div class="data-label">ALLWEONE</div></div>
      <div class="data-sep"></div>
      <div class="data-item"><div class="data-val" style="color:#a0a0c0">1.4K</div><div class="data-label">ai-to-pptx</div></div>
    </div>
  </div>
</div>
</body>
</html>
