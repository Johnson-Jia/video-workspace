<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0d1117; }
  .wrap { width: 1920px; height: 1080px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative; }
  .grid-bg { position: absolute; width: 100%; height: 100%;
    background-image: linear-gradient(rgba(0,229,160,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.06) 1px, transparent 1px);
    background-size: 40px 40px; }
  .glow { position: absolute; width: 800px; height: 800px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,160,0.08), transparent 70%); }
  .glow2 { position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,136,62,0.06), transparent 70%); }
  .week-label { font-size: 36px; color: #00e5a0; font-weight: 700; z-index:1;
    letter-spacing: 2px; }
  .title { font-size: 72px; color: #ffffff; font-weight: 900; margin-top: 20px;
    letter-spacing: 4px; z-index:1; }
  .cards { display: flex; gap: 40px; margin-top: 60px; z-index:1; }
  .card { width: 360px; padding: 30px; background: rgba(22,27,34,0.9);
    border: 1px solid rgba(0,229,160,0.15); border-radius: 16px;
    text-align: center; transition: border-color 0.3s; }
  .card:hover { border-color: rgba(0,229,160,0.4); }
  .card-rank { font-family: 'JetBrains Mono', monospace; font-size: 18px;
    color: #8b949e; font-weight: 400; margin-bottom: 8px; }
  .card-name { font-family: 'JetBrains Mono', monospace; font-size: 26px;
    color: #58a6ff; font-weight: 700; }
  .card-stars { font-family: 'JetBrains Mono', monospace; font-size: 44px;
    color: #f0883e; font-weight: 900; margin-top: 12px; }
  .card-unit { font-size: 18px; color: #8b949e; margin-top: 6px; }
  .stats { font-size: 28px; color: #8b949e; margin-top: 50px; z-index:1; }
  .stats span { color: #00e5a0; font-weight: 700; }
  .badge { display: inline-block; padding: 6px 16px; border-radius: 20px;
    font-size: 16px; font-weight: 700; margin-top: 30px; z-index:1;
    background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3);
    color: #00e5a0; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-200px; left:-200px;"></div>
  <div class="glow2" style="bottom:-150px; right:-100px;"></div>
  <div class="week-label">2026年5月第4周</div>
  <div class="title">GitHub 热门开源项目盘点</div>
  <div class="cards">
    <div class="card">
      <div class="card-rank">TOP 1</div>
      <div class="card-name">codegraph</div>
      <div class="card-stars">+18,136</div>
      <div class="card-unit">★ 本周热度</div>
    </div>
    <div class="card">
      <div class="card-rank">TOP 2</div>
      <div class="card-name">openhuman</div>
      <div class="card-stars">+15,194</div>
      <div class="card-unit">★ 本周热度</div>
    </div>
    <div class="card">
      <div class="card-rank">TOP 3</div>
      <div class="card-name">academic-skills</div>
      <div class="card-stars">+11,401</div>
      <div class="card-unit">★ 本周热度</div>
    </div>
  </div>
  <div class="stats">本周热度 <span>124,617</span>★ · <span>17</span> 个项目 · <span>4</span> 个分类</div>
  <div class="badge">Agent 统治了一切</div>
</div>
</body>
</html>
