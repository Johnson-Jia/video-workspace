<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent-warm:#ffb800;
  --accent-cool:#00f0ff;
  --accent-purple:#a855f7;
  --bg-dark:#0a0a1a;
  --text-white:#ffffff;
  --text-muted:#8892b0;
  --card-bg:rgba(255,255,255,0.06);
}
body{background:#050510;overflow:hidden;font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif}
.cover{position:relative;width:2160px;height:3840px;background:linear-gradient(180deg,#0a0a1a 0%,#1a0a3e 40%,#0a0a1a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.glow-warm{position:absolute;width:1400px;height:1400px;border-radius:50%;background:radial-gradient(circle,rgba(255,184,0,0.18),transparent 70%);filter:blur(200px);top:-200px;left:-400px;pointer-events:none}
.glow-cool{position:absolute;width:1200px;height:1200px;border-radius:50%;background:radial-gradient(circle,rgba(0,240,255,0.12),transparent 70%);filter:blur(200px);bottom:-200px;right:-400px;pointer-events:none}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,240,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.02) 1px,transparent 1px);background-size:120px 120px;pointer-events:none}

.date{position:relative;font-size:72px;font-weight:700;color:var(--accent-warm);letter-spacing:6px;margin-bottom:48px}
.badge{position:relative;display:inline-block;background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(168,85,247,0.35));border:2px solid rgba(168,85,247,0.5);border-radius:100px;padding:24px 80px;font-size:56px;font-weight:700;color:var(--accent-purple);letter-spacing:6px;margin-bottom:100px}
.main-title{position:relative;text-align:center;line-height:1.2;margin-bottom:80px}
.main-title .t1{font-size:200px;font-weight:900;color:var(--text-white);letter-spacing:-4px}
.main-title .t2{font-size:200px;font-weight:900;color:var(--accent-cool);letter-spacing:-4px;text-shadow:0 0 80px rgba(0,240,255,0.4)}
.divider{position:relative;width:800px;height:8px;border-radius:4px;background:linear-gradient(90deg,var(--accent-warm),var(--accent-cool));margin-bottom:80px}
.data-sub{position:relative;font-size:80px;font-weight:600;color:var(--accent-warm);letter-spacing:4px;margin-bottom:100px;text-align:center}
.cards{position:relative;display:flex;gap:60px}
.card{background:var(--card-bg);border:2px solid rgba(0,240,255,0.2);border-radius:40px;padding:56px 88px;text-align:center;min-width:420px}
.card .num{font-family:'JetBrains Mono',monospace;font-size:100px;font-weight:700;line-height:1}
.card .num.cyan{color:var(--accent-cool)}
.card .num.gold{color:var(--accent-warm)}
.card .num.purple{color:var(--accent-purple)}
.card .label{font-size:44px;color:var(--text-muted);margin-top:20px;letter-spacing:2px}
</style>
</head>
<body>
<div data-composition-id="cover" data-width="2160" data-height="3840" data-start="0" data-duration="1">
<div class="clip" data-start="0" data-duration="1">
<div class="cover">
  <div class="glow-warm"></div>
  <div class="glow-cool"></div>
  <div class="grid-bg"></div>
  <div class="date">2026年5月27日</div>
  <div class="badge">SOURCE CODE LEAKED</div>
  <div class="main-title">
    <span class="t1">Claude Code</span><br>
    <span class="t2">源码泄露</span>
  </div>
  <div class="divider"></div>
  <div class="data-sub">51万行代码完整曝光</div>
  <div class="cards">
    <div class="card"><div class="num cyan">53</div><div class="label">内置工具</div></div>
    <div class="card"><div class="num gold">7</div><div class="label">隐藏功能</div></div>
    <div class="card"><div class="num purple">50</div><div class="label">编译开关</div></div>
  </div>
</div>
</div>
</div>
<script>window.__hf={duration:1,seek:function(t){}};window.__timelines={};</script>
</body>
</html>
