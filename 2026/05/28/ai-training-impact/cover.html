<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent-primary: #00E5A0;
  --accent-primary-soft: #33FFBB;
  --accent-secondary: #FFB020;
  --accent-secondary-soft: #FFC848;
  --accent-alert: #B040FF;
  --bg-dark: #080818;
  --text-white: #FFFFFF;
  --text-muted: #8899BB;
  --card-bg: rgba(20,20,50,0.85);
}

body { background: #050510; overflow: hidden; font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

.cover {
  position: relative; width: 2160px; height: 3840px;
  background: linear-gradient(180deg, var(--bg-dark) 0%, #0d0d2a 40%, #080818 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
}

/* Background grid */
.cover::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
}

.glow-warm {
  position: absolute; width: 1400px; height: 1400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,176,32,0.15), transparent 70%);
  filter: blur(200px); top: -200px; left: -400px; pointer-events: none;
}
.glow-cool {
  position: absolute; width: 1200px; height: 1200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,160,0.12), transparent 70%);
  filter: blur(200px); bottom: -200px; right: -400px; pointer-events: none;
}

/* Layer 1: Date */
.date { position: relative; font-size: 80px; font-weight: 800;
  color: var(--accent-secondary); letter-spacing: 8px; margin-bottom: 40px; }

/* Layer 2: Scene Label */
.scene-label { position: relative; font-size: 64px; font-weight: 600;
  color: var(--accent-primary); letter-spacing: 6px; margin-bottom: 80px;
  opacity: 0.85; }

/* Layer 3: Badge */
.badge { position: relative; display: inline-block;
  background: linear-gradient(135deg, rgba(0,229,160,0.12), rgba(0,229,160,0.22));
  border: 2px solid rgba(0,229,160,0.4); border-radius: 100px;
  padding: 28px 100px; font-size: 64px; font-weight: 700;
  color: var(--accent-primary-soft); letter-spacing: 8px; margin-bottom: 120px;
  box-shadow: 0 0 60px rgba(0,229,160,0.1); }

/* Layer 4: Main Title */
.main-title { position: relative; text-align: center; line-height: 1.15; margin-bottom: 64px; }
.main-title .white { font-size: 200px; font-weight: 900; color: var(--text-white); letter-spacing: -4px; }
.main-title .accent { font-size: 200px; font-weight: 900; color: var(--accent-primary); letter-spacing: -4px;
  text-shadow: 0 0 80px rgba(0,229,160,0.4), 0 0 160px rgba(0,229,160,0.15); }

/* Layer 5: Gradient Divider */
.divider { position: relative; width: 900px; height: 10px; border-radius: 5px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); margin-bottom: 80px; }

/* Layer 6: Data Subtitle */
.data-subtitle { position: relative; font-size: 80px; font-weight: 600;
  color: var(--text-muted); letter-spacing: 4px; margin-bottom: 100px; }
.data-subtitle em { font-style: normal; color: var(--accent-secondary); }

/* Layer 7: Data Cards */
.cards { position: relative; display: flex; gap: 60px; }
.card { background: var(--card-bg);
  border: 2px solid rgba(0,229,160,0.2); border-radius: 48px;
  padding: 56px 80px; text-align: center; min-width: 440px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
.card .num { font-family: 'JetBrains Mono', monospace; font-size: 110px;
  font-weight: 700; color: var(--accent-secondary-soft); line-height: 1; }
.card .label { font-size: 48px; color: var(--text-muted); margin-top: 20px; letter-spacing: 2px; }
</style>
</head>
<body>
<div data-composition-id="cover" data-width="2160" data-height="3840" data-start="0" data-duration="1">
<div class="clip" data-start="0" data-duration="1">
<div class="cover">
  <div class="glow-warm"></div>
  <div class="glow-cool"></div>

  <!-- Layer 1: Date -->
  <div class="date">2026年5月28日</div>

  <!-- Layer 2: Scene Label -->
  <div class="scene-label">AI 行业深度分析</div>

  <!-- Layer 3: Badge -->
  <div class="badge">企业培训冲击</div>

  <!-- Layer 4: Main Title -->
  <div class="main-title">
    <span class="white">$4175亿市场</span><br>
    <span class="accent">AI重构培训</span>
  </div>

  <!-- Layer 5: Gradient Divider -->
  <div class="divider"></div>

  <!-- Layer 6: Data Subtitle -->
  <div class="data-subtitle">5大维度 · <em>19个场景</em> · 深度拆解</div>

  <!-- Layer 7: Data Cards -->
  <div class="cards">
    <div class="card">
      <div class="num">21.7%</div>
      <div class="label">AI培训年复合增速</div>
    </div>
    <div class="card">
      <div class="num">+828%</div>
      <div class="label">AI软件销售增长</div>
    </div>
  </div>
</div>
</div>
</div>
<script>window.__hf = { duration: 1, seek: function(t) {} };window.__timelines = {};</script>
</body>
</html>
