<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --glm-blue: #00D4FF;
  --qwen-orange: #FF8C32;
  --win-green: #34D399;
  --bg-dark: #080820;
  --text-white: #FFFFFF;
  --text-muted: #8899BB;
  --card-bg: rgba(20,20,50,0.85);
}
body { background: #050510; overflow: hidden; font-family: 'Inter','PingFang SC','Microsoft YaHei',sans-serif; }
.cover {
  position: relative; width: 2160px; height: 3840px;
  background: linear-gradient(180deg, var(--bg-dark) 0%, #0d0d2a 40%, #080818 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
}
.glow-warm {
  position: absolute; width: 1400px; height: 1400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,140,50,0.18), transparent 70%);
  filter: blur(200px); top: -200px; left: -400px; pointer-events: none;
}
.glow-cool {
  position: absolute; width: 1200px; height: 1200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.12), transparent 70%);
  filter: blur(200px); bottom: -200px; right: -400px; pointer-events: none;
}
.date { position: relative; font-size: 80px; font-weight: 800; color: var(--qwen-orange); letter-spacing: 8px; margin-bottom: 40px; }
.scene-label { position: relative; font-size: 64px; font-weight: 600; color: var(--glm-blue); letter-spacing: 6px; margin-bottom: 80px; }
.badge { position: relative; display: inline-block;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.25));
  border: 2px solid rgba(0,212,255,0.4); border-radius: 100px;
  padding: 28px 100px; font-size: 64px; font-weight: 700;
  color: var(--glm-blue); letter-spacing: 8px; margin-bottom: 120px; }
.main-title { position: relative; text-align: center; line-height: 1.2; margin-bottom: 64px; }
.main-title .white { font-size: 220px; font-weight: 900; color: var(--text-white); letter-spacing: -4px; }
.main-title .accent { font-size: 220px; font-weight: 900; color: var(--qwen-orange); letter-spacing: -4px;
  text-shadow: 0 0 80px rgba(255,140,50,0.4), 0 0 160px rgba(255,140,50,0.15); }
.divider { position: relative; width: 900px; height: 10px; border-radius: 5px;
  background: linear-gradient(90deg, var(--qwen-orange), var(--glm-blue)); margin-bottom: 80px; }
.data-line { position: relative; font-size: 88px; font-weight: 600; color: var(--text-muted); letter-spacing: 4px; margin-bottom: 120px; text-align: center; }
.cards { position: relative; display: flex; gap: 60px; }
.card { background: var(--card-bg); border-radius: 40px; padding: 60px 80px; text-align: center;
  border: 2px solid rgba(255,255,255,0.08); min-width: 500px; }
.card .number { font-size: 120px; font-weight: 900; letter-spacing: -2px; }
.card .label { font-size: 52px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
<div class="cover">
  <div class="glow-warm"></div>
  <div class="glow-cool"></div>
  <div class="date">2026年5月28日</div>
  <div class="scene-label">大模型实战对比</div>
  <div class="badge">GLM-5.1 vs Qwen3.7</div>
  <div class="main-title">
    <span class="white">实测</span><span class="accent">翻车</span>
  </div>
  <div class="divider"></div>
  <div class="data-line">4组对照实验 · 编码能力实测</div>
  <div class="cards">
    <div class="card">
      <div class="number" style="color:var(--win-green)">32分</div>
      <div class="label">GLM-5.1 最高分</div>
    </div>
    <div class="card">
      <div class="number" style="color:var(--qwen-orange)">21分</div>
      <div class="label">Qwen3.7 最低分</div>
    </div>
  </div>
</div>
</body>
</html>
