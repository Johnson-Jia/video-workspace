<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #080818; }
  .wrap {
    width: 1080px; height: 1080px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
    background: linear-gradient(135deg, #080818 0%, #0d1030 40%, #080818 100%);
  }
  .grid-bg {
    position: absolute; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(240,180,41,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,180,41,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow1 {
    position: absolute; width: 450px; height: 450px; border-radius: 50%;
    background: #f0b429; filter: blur(140px); opacity: 0.2;
    top: -100px; left: -100px;
  }
  .glow2 {
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    background: #00e5a0; filter: blur(130px); opacity: 0.16;
    bottom: -80px; right: -80px;
  }
  .badge {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(240,180,41,0.1); border: 2px solid rgba(240,180,41,0.35);
    color: #f0b429; font-size: 28px; font-weight: 700;
    padding: 12px 32px; border-radius: 30px;
    letter-spacing: 2px; margin-bottom: 36px;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #f0b429;
  }
  .title {
    position: relative; z-index: 1;
    font-size: 90px; font-weight: 900; color: #fff;
    text-align: center; line-height: 1.15; letter-spacing: -1px;
  }
  .title .accent { color: #f0b429; }
  .divider {
    position: relative; z-index: 1;
    width: 180px; height: 5px;
    background: linear-gradient(90deg, #f0b429, #00e5a0);
    border-radius: 3px; margin-top: 36px; margin-bottom: 36px;
  }
  .sub {
    position: relative; z-index: 1;
    font-size: 40px; font-weight: 600; color: #00e5a0;
    text-align: center; letter-spacing: 2px;
  }
  .sub-desc {
    position: relative; z-index: 1;
    font-size: 26px; font-weight: 400; color: #8892b0;
    text-align: center; margin-top: 18px; letter-spacing: 1px;
  }
  .bottom-bar {
    position: absolute; bottom: 40px; left: 60px; right: 60px;
    display: flex; justify-content: space-between; align-items: center; z-index: 1;
  }
  .bottom-tag {
    font-size: 22px; font-weight: 700; color: #8892b0;
    font-family: 'JetBrains Mono', monospace;
  }
  .bottom-freq {
    font-size: 22px; font-weight: 700; color: #f0b429;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div data-composition-id="cover" data-width="1080" data-height="1080" data-start="0">
<div class="wrap">
  <div class="grid-bg"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="badge">
    <div class="badge-dot"></div>
    DAILY TRENDING
  </div>
  <div class="title">GitHub<br/><span class="accent">每日榜单</span></div>
  <div class="divider"></div>
  <div class="sub">今日热门开源项目</div>
  <div class="sub-desc">AI / 工具 / 框架 / 新星 一网打尽</div>
  <div class="bottom-bar">
    <div class="bottom-freq">每日更新</div>
    <div class="bottom-tag">@GitHub星探</div>
  </div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
window.__timelines = {};
const tl = gsap.timeline({paused: true});
tl.to({}, {duration: 0.5});
window.__timelines["cover"] = tl;
</script>
</body>
</html>
