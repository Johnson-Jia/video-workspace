<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #080818; }
  .wrap {
    width: 1080px; height: 1080px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
    background: linear-gradient(135deg, #080818 0%, #0d1030 40%, #080818 100%);
  }
  .grid-bg {
    position: absolute; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow1 {
    position: absolute; width: 450px; height: 450px; border-radius: 50%;
    background: #3b82f6; filter: blur(140px); opacity: 0.22;
    top: -100px; left: 50%; transform: translateX(-50%);
  }
  .glow2 {
    position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: #06b6d4; filter: blur(120px); opacity: 0.16;
    bottom: -60px; right: -60px;
  }
  .glow3 {
    position: absolute; width: 250px; height: 250px; border-radius: 50%;
    background: #f59e0b; filter: blur(110px); opacity: 0.12;
    bottom: -60px; left: -60px;
  }
  .badge {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(59,130,246,0.1); border: 2px solid rgba(59,130,246,0.35);
    color: #3b82f6; font-size: 28px; font-weight: 700;
    padding: 12px 32px; border-radius: 30px;
    letter-spacing: 2px; margin-bottom: 36px;
  }
  .badge-star { font-size: 24px; }
  .title {
    position: relative; z-index: 1;
    font-size: 90px; font-weight: 900; color: #fff;
    text-align: center; line-height: 1.15; letter-spacing: -1px;
  }
  .title .accent { color: #3b82f6; }
  .divider {
    position: relative; z-index: 1;
    width: 180px; height: 5px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    border-radius: 3px; margin-top: 36px; margin-bottom: 36px;
  }
  .sub {
    position: relative; z-index: 1;
    font-size: 40px; font-weight: 600; color: #06b6d4;
    text-align: center; letter-spacing: 2px;
  }
  .sub-desc {
    position: relative; z-index: 1;
    font-size: 26px; font-weight: 400; color: #8892b0;
    text-align: center; margin-top: 18px; letter-spacing: 1px;
    line-height: 1.5;
  }
  .highlight-row {
    position: relative; z-index: 1;
    display: flex; gap: 20px; margin-top: 32px;
  }
  .highlight-item {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .highlight-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 42px; font-weight: 700; color: #3b82f6;
  }
  .highlight-label {
    font-size: 20px; color: #8892b0; letter-spacing: 1px;
  }
  .highlight-divider {
    width: 1px; height: 50px; background: rgba(139,92,246,0.3); align-self: center;
  }
  .bottom-bar {
    position: absolute; bottom: 40px; left: 60px; right: 60px;
    display: flex; justify-content: space-between; align-items: center; z-index: 1;
  }
  .bottom-tag {
    font-size: 22px; font-weight: 700; color: #8892b0;
    font-family: 'JetBrains Mono', monospace;
  }
  .bottom-freq {
    font-size: 22px; font-weight: 700; color: #3b82f6;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div data-composition-id="cover" data-width="1080" data-height="1080" data-start="0">
<div class="wrap">
  <div class="grid-bg"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="badge">
    <span class="badge-star">★</span>
    DEEP ANALYSIS
  </div>
  <div class="title">互联网<br/><span class="accent">需求深度分析</span></div>
  <div class="divider"></div>
  <div class="sub">热门赛道全景解读</div>
  <div class="sub-desc">用户需求 · 竞争格局 · 开源生态 · 商业路径</div>
  <div class="highlight-row">
    <div class="highlight-item">
      <div class="highlight-num">∞</div>
      <div class="highlight-label">持续更新</div>
    </div>
    <div class="highlight-divider"></div>
    <div class="highlight-item">
      <div class="highlight-num">360°</div>
      <div class="highlight-label">多维解读</div>
    </div>
    <div class="highlight-divider"></div>
    <div class="highlight-item">
      <div class="highlight-num">Deep</div>
      <div class="highlight-label">深度分析</div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="bottom-freq">深度研究报告</div>
    <div class="bottom-tag">@GitHub星探</div>
  </div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
window.__timelines = {};
const tl = gsap.timeline({paused: true});
tl.to({}, {duration: 0.5});
window.__timelines["cover"] = tl;
</script>
</body>
</html>
