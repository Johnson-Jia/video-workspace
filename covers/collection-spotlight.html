<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #080818; }
  .wrap {
    width: 1080px; height: 1080px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
    background: linear-gradient(135deg, #080818 0%, #1a0d2e 40%, #080818 100%);
  }
  .grid-bg {
    position: absolute; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(139,92,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow1 {
    position: absolute; width: 450px; height: 450px; border-radius: 50%;
    background: #8b5cf6; filter: blur(140px); opacity: 0.22;
    top: -100px; left: 50%; transform: translateX(-50%);
  }
  .glow2 {
    position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: #f0883e; filter: blur(120px); opacity: 0.16;
    bottom: -60px; right: -60px;
  }
  .glow3 {
    position: absolute; width: 250px; height: 250px; border-radius: 50%;
    background: #f0b429; filter: blur(110px); opacity: 0.12;
    bottom: -60px; left: -60px;
  }
  .badge {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(139,92,246,0.1); border: 2px solid rgba(139,92,246,0.35);
    color: #8b5cf6; font-size: 28px; font-weight: 700;
    padding: 12px 32px; border-radius: 30px;
    letter-spacing: 2px; margin-bottom: 36px;
  }
  .badge-star { font-size: 24px; }
  .title {
    position: relative; z-index: 1;
    font-size: 90px; font-weight: 900; color: #fff;
    text-align: center; line-height: 1.15; letter-spacing: -1px;
  }
  .title .accent { color: #f0883e; }
  .divider {
    position: relative; z-index: 1;
    width: 180px; height: 5px;
    background: linear-gradient(90deg, #8b5cf6, #f0883e);
    border-radius: 3px; margin-top: 36px; margin-bottom: 36px;
  }
  .sub {
    position: relative; z-index: 1;
    font-size: 40px; font-weight: 600; color: #f0883e;
    text-align: center; letter-spacing: 2px;
  }
  .sub-desc {
    position: relative; z-index: 1;
    font-size: 26px; font-weight: 400; color: #8892b0;
    text-align: center; margin-top: 18px; letter-spacing: 1px;
    line-height: 1.5;
  }
  .feature-row {
    position: relative; z-index: 1;
    display: flex; gap: 20px; margin-top: 32px;
  }
  .feature-tag {
    background: rgba(139,92,246,0.12);
    border: 1px solid rgba(139,92,246,0.25);
    color: #c4b5fd; font-size: 22px; font-weight: 600;
    padding: 10px 24px; border-radius: 20px;
    letter-spacing: 1px;
  }
  .bottom-bar {
    position: absolute; bottom: 40px; left: 60px; right: 60px;
    display: flex; justify-content: space-between; align-items: center; z-index: 1;
  }
  .bottom-tag {
    font-size: 22px; font-weight: 700; color: #8892b0;
    font-family: 'JetBrains Mono', monospace;
  }
  .bottom-freq {
    font-size: 22px; font-weight: 700; color: #8b5cf6;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div data-composition-id="cover" data-width="1080" data-height="1080" data-start="0">
<div class="wrap">
  <div class="grid-bg"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="badge">
    <span class="badge-star">★</span>
    FEATURED SPOTLIGHT
  </div>
  <div class="title">GitHub<br/><span class="accent">精品介绍</span></div>
  <div class="divider"></div>
  <div class="sub">深度解读优质开源项目</div>
  <div class="sub-desc">架构分析 · 技术选型 · 应用场景 · 二次开发</div>
  <div class="feature-row">
    <div class="feature-tag">源码解读</div>
    <div class="feature-tag">技术架构</div>
    <div class="feature-tag">实战应用</div>
  </div>
  <div class="bottom-bar">
    <div class="bottom-freq">不定期更新</div>
    <div class="bottom-tag">@GitHub星探</div>
  </div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
window.__timelines = {};
const tl = gsap.timeline({paused: true});
tl.to({}, {duration: 0.5});
window.__timelines["cover"] = tl;
</script>
</body>
</html>
