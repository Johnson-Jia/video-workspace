<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a14; }
  .wrap {
    width: 1080px; height: 1080px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
    background: linear-gradient(135deg, #0a0a14 0%, #0d1a28 40%, #0a0a14 100%);
  }
  .grid-bg {
    position: absolute; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow1 {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: #00D4FF; filter: blur(150px); opacity: 0.2;
    top: -120px; left: -100px;
  }
  .glow2 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: #FF6B35; filter: blur(130px); opacity: 0.18;
    bottom: -100px; right: -80px;
  }
  .glow3 {
    position: absolute; width: 250px; height: 250px; border-radius: 50%;
    background: #00D4FF; filter: blur(100px); opacity: 0.1;
    bottom: 100px; left: 50%; transform: translateX(-50%);
  }
  /* Speed lines */
  .speed-line {
    position: absolute; height: 2px; border-radius: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
  }
  .badge {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(0,212,255,0.1); border: 2px solid rgba(0,212,255,0.35);
    color: #00D4FF; font-size: 28px; font-weight: 700;
    padding: 12px 32px; border-radius: 30px;
    letter-spacing: 2px; margin-bottom: 36px;
  }
  .badge-bolt { font-size: 22px; }
  .title {
    position: relative; z-index: 1;
    font-size: 100px; font-weight: 900; color: #fff;
    text-align: center; line-height: 1.15; letter-spacing: 2px;
  }
  .title .accent { color: #00D4FF; }
  .title .warm { color: #FF6B35; }
  .divider {
    position: relative; z-index: 1;
    width: 180px; height: 5px;
    background: linear-gradient(90deg, #00D4FF, #FF6B35);
    border-radius: 3px; margin-top: 36px; margin-bottom: 36px;
  }
  .sub {
    position: relative; z-index: 1;
    font-size: 38px; font-weight: 600; color: #FF6B35;
    text-align: center; letter-spacing: 2px;
  }
  .sub-desc {
    position: relative; z-index: 1;
    font-size: 26px; font-weight: 400; color: #8892b0;
    text-align: center; margin-top: 18px; letter-spacing: 1px;
    line-height: 1.5;
  }
  .feature-row {
    position: relative; z-index: 1;
    display: flex; gap: 20px; margin-top: 32px;
  }
  .feature-tag {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.25);
    color: #7dd3fc; font-size: 22px; font-weight: 600;
    padding: 10px 24px; border-radius: 20px;
    letter-spacing: 1px;
  }
  .feature-tag.warm {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.25);
    color: #fdba74;
  }
  .bottom-bar {
    position: absolute; bottom: 40px; left: 60px; right: 60px;
    display: flex; justify-content: space-between; align-items: center; z-index: 1;
  }
  .bottom-tag {
    font-size: 22px; font-weight: 700; color: #8892b0;
    font-family: 'JetBrains Mono', monospace;
  }
  .bottom-freq {
    font-size: 22px; font-weight: 700; color: #00D4FF;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div data-composition-id="cover" data-width="1080" data-height="1080" data-start="0">
<div class="wrap">
  <div class="grid-bg"></div>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>

  <!-- Speed lines for urgency feel -->
  <div class="speed-line" style="top:18%;left:5%;width:320px;transform:rotate(-3deg);"></div>
  <div class="speed-line" style="top:35%;left:60%;width:280px;transform:rotate(2deg);"></div>
  <div class="speed-line" style="top:72%;left:15%;width:350px;transform:rotate(-1deg);"></div>
  <div class="speed-line" style="top:82%;left:55%;width:250px;transform:rotate(3deg);"></div>

  <div class="badge">
    <span class="badge-bolt">&#9889;</span>
    TECH DISPATCH
  </div>
  <div class="title"><span class="accent">码圈</span><span class="warm">快报</span></div>
  <div class="divider"></div>
  <div class="sub">技术圈新鲜事</div>
  <div class="sub-desc">花边新闻 · 人物动态 · 行业八卦 · 第一时间</div>
  <div class="feature-row">
    <div class="feature-tag">圈内动态</div>
    <div class="feature-tag warm">技术八卦</div>
    <div class="feature-tag">突发速报</div>
  </div>
  <div class="bottom-bar">
    <div class="bottom-freq">不定期更新</div>
    <div class="bottom-tag">@GitHub星探</div>
  </div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
window.__timelines = {};
const tl = gsap.timeline({paused: true});
tl.to({}, {duration: 0.5});
window.__timelines["cover"] = tl;
</script>
</body>
</html>
